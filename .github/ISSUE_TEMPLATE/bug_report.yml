name: Bug report
description: Report a package, analyzer, code fix, documentation, or tooling bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest code sample, command, or project shape that reproduces the issue.
      render: csharp
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version or commit
      placeholder: 0.1.0-preview.1 or commit SHA
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

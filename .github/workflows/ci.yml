name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore HttpClient.Resilience.Analyzers.slnx

      - name: Format
        run: dotnet format HttpClient.Resilience.Analyzers.slnx --verify-no-changes --no-restore --exclude samples

      - name: Build
        run: dotnet build HttpClient.Resilience.Analyzers.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test HttpClient.Resilience.Analyzers.slnx --configuration Release --no-build --logger trx

      - name: Pack
        run: dotnet pack src/HttpClient.Resilience.Analyzers.Package/HttpClient.Resilience.Analyzers.Package.csproj --configuration Release --no-build --output artifacts/packages

      - name: Validate package contents
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts/packages/*.nupkg | Select-Object -First 1
          $contents = tar -tf $package.FullName
          $required = @(
            'analyzers/dotnet/cs/HttpClient.Resilience.Analyzers.dll',
            'icon.png',
            'contentFiles/any/any/profiles/default.editorconfig',
            'contentFiles/any/any/profiles/strict-ci.editorconfig',
            'contentFiles/any/any/profiles/brownfield-adoption.editorconfig',
            'contentFiles/any/any/profiles/library-author.editorconfig'
          )

          foreach ($path in $required) {
            if ($contents -notcontains $path) {
              throw "Package is missing $path"
            }
          }

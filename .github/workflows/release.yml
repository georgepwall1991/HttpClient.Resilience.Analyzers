name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Push package to NuGet.org'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, validate, and publish package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: ./scripts/Validate-ReleaseVersion.ps1 -Ref '${{ github.ref }}'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore HttpClient.Resilience.Analyzers.slnx

      - name: Verify formatting
        run: dotnet format HttpClient.Resilience.Analyzers.slnx --verify-no-changes --no-restore --exclude samples

      - name: Build
        run: dotnet build HttpClient.Resilience.Analyzers.slnx --configuration Release --no-restore

      - name: Validate repository metadata
        shell: pwsh
        run: ./scripts/Validate-Repository.ps1

      - name: Validate sample diagnostics
        shell: pwsh
        run: ./scripts/Validate-SampleDiagnostics.ps1 -NoRestore

      - name: Test
        run: dotnet test HttpClient.Resilience.Analyzers.slnx --configuration Release --no-build --logger trx --results-directory artifacts/test-results

      - name: Pack
        run: dotnet pack src/HttpClient.Resilience.Analyzers.Package/HttpClient.Resilience.Analyzers.Package.csproj --configuration Release --no-build --output artifacts/packages

      - name: Validate package
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts/packages/*.nupkg | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          ./scripts/Validate-Package.ps1 -PackagePath $package.FullName -ExpectedRepositoryCommit '${{ github.sha }}'
          ./scripts/Validate-PackageConsumption.ps1 -PackagePath $package.FullName

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg
          if-no-files-found: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: artifacts/test-results/*.trx
          if-no-files-found: ignore

      - name: Validate trusted publishing configuration
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace('${{ vars.NUGET_USER }}')) {
              throw 'NUGET_USER repository variable is required for NuGet trusted publishing.'
          }

      - name: NuGet trusted publishing login
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
              throw 'NuGet trusted publishing did not return a temporary API key.'
          }

          $packages = Get-ChildItem artifacts/packages/*.nupkg
          foreach ($package in $packages) {
              dotnet nuget push $package.FullName `
                  --api-key $env:NUGET_API_KEY `
                  --source https://api.nuget.org/v3/index.json `
                  --skip-duplicate
          }

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag.TrimStart('v')
          $assets = @(Get-ChildItem artifacts/packages/*.nupkg | ForEach-Object { $_.FullName })

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
              gh release upload $tag $assets --clobber
          }
          else {
              gh release create $tag $assets `
                  --verify-tag `
                  --generate-notes `
                  --title "HttpClient.Resilience.Analyzers $version"
          }
